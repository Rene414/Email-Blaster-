<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Email Blaster - Create Email</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../static/style.css">
    <link href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-bs4.min.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Email Blaster</a>
            <div class="d-flex">
                <a class="btn btn-outline-light me-2" href="#">Admin Page</a>
                <a href="#" class="btn btn-danger">Logout</a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-10">
                    <div class="glass-card">
                        <h1 class="mb-4">Create New Email Campaign</h1>
                        <form action="#" method="POST" enctype="multipart/form-data">
                            <div class="mb-3">
                                <label for="subject" class="form-label">Subject</label>
                                <input type="text" class="form-control" name="subject" id="subject" placeholder="Enter email subject">
                            </div>
                            <div class="mb-3">
                                <label for="emailContent" class="form-label">Email Content</label>
                                <textarea class="form-control" name="emailContent" id="emailContent"></textarea>
                            </div>
                            <div class="d-flex justify-content-end">
                                <button type="submit" name="action_type" value="confirm" class="btn btn-custom-secondary me-2">Confirm</button>
                                <button type="submit" id="submit" name="action_type" value="submit" class="btn btn-custom-primary">Submit</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-bs4.min.js"></script>
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>

    <script>
        $(document).ready(function () {
            $('#emailContent').summernote({
                height: 300, // Sets the visual height of the editing area
                toolbar: [
                    ['style', ['style']],
                    ['font', ['bold', 'underline', 'clear']],
                    ['color', ['color']],
                    ['para', ['ul', 'ol', 'paragraph']],
                    ['table', ['table']],
                    ['insert', ['link', 'picture', 'video']],
                    ['view', ['fullscreen', 'codeview', 'help']]
                ]
            });
        });

        var socket = io();
        socket.on('button_enabled', function (data) {
            if (data.status === 'True') {
                document.getElementById('submit').disabled = false;
            }
        });
        socket.on('confirmation_channel', function (data) {
            // You might want to display this somewhere else, maybe a toast notification
            console.log('Confirmations: ' + data.amount);
        });
    </script>

</body>

</html>
