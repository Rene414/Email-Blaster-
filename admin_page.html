<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Email Blaster</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <link href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-bs4.min.css" rel="stylesheet">
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid justify-content-center">
            <a class="navbar-brand" href="/">Email Blaster</a>
        </div>
        <ul class="navbar-nav">
            <li class="nav-item">
                <a class="btn btn-dark" style='width: 115px;' href="{{url_for('frontend')}}">Home Page</a>
            </li>
            <li class="nav-item">
                {% if current_user.is_authenticated %}
                <a href="{{ url_for('logout') }}" class="btn btn-danger">Logout</a>
                {% endif %}
            </li>
        </ul>
    </nav>



    <h1 class="custom-margin-top3">Users</h1>
    <div class="row">
        <div class='col-5'>
            <div class="container" id="custom-margin-top4">
                <table class="table table-bordered table-dark table-striped">
                    <thread>
                        <th scope="col">ID</th>
                        <th scope="col">Username</th>
                        <th scope="col">Admin Permissions?</th>
                    </thread>
                    <tbody>
                        {% for user in users_table %}
                        <tr>
                            <th scope="row">{{user.id}}</th>
                            <td>{{user.username}}</td>
                            <td>{{user.admin}}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
                <form action="{{url_for('admin_page')}}" class = "custom-margin-top2"id = "form2" method="POST" enctype="multipart/form-data">
                    <div class="mb-2">
                        <label for="form_type" class="form-label">Adding or Deleting Users?</label>
                        <select class="form-control" name = "user_form_type" id="form_type">
                            <option selected>Options</option>
                            <option value="add_user">Add User</option>
                            <option value="delete_user">Delete User</option>
                        </select>
                    </div>
                    <div id="add_form" class="d-none mb-3">
                        <label for="username">Username: </label>
                        <input type="text" class="form-control" name="username" id="username" placeholder="Username">
                        <label for="password">Password</label>
                        <input type="password" class="form-control" name = "password" id="password" placeholder="Password">
                        <input class = "form-check-input" name = "admin" type = "checkbox" id = "admin_privilege">
                        <label class = "form-check-label" for ="admin_privilege">Admin?</label>
                    </div>

                    <div id="delete_form" class="d-none mb-2">
                        <label for="id">Username: </label>
                        <select class="form-control" name = "user_id" id="user_id">
                            {% for user in users_table %}
                            <option value="{{user.id}}">{{user.id}}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class = "mb-4">
                        <button type="submit" name="action_type" value="confirm" class="btn btn-primary">Submit</button>
                    </div>
                </form>


            </div>
        </div>
        <div class='col-9'>
            <div class="container-xxl">
                <div class="row justify-content-center">

                </div>
            </div>
        </div>

    </div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-bs4.min.js"></script>

    <script>
        const dropdown = document.getElementById('form_type')
        const add_form = document.getElementById('add_form')
        const delete_form = document.getElementById('delete_form')

        dropdown.addEventListener('change', function(){
            add_form.classList.add('d-none');
            delete_form.classList.add('d-none');

            if (this.value === 'add_user'){
                add_form.classList.remove('d-none');
            }else if (this.value === 'delete_user'){
                delete_form.classList.remove('d-none');
            }
        });


    </script>

</body>

</html>
