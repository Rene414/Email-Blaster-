<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, inital-scale=1">
    <title>Email Blaster</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <link href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-bs4.min.css" rel="stylesheet">
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
</head>

<body>
   




    <div class="row ">
        <div class='col-5'>
            <div class="container mx-auto " id="custom-margin-top2">

                <h2 class="text-center">Confirmations: <span id="confirmation_counter">0</span></h2>
                <div class="card mx-auto">
                    <div class="card-body">
                        <h5 class="card-title">Card title</h5>
                        <h6 class="card-subtitle mb-2">Card subtitle</h6>
                        <p class="card-text">Text</p>
                    </div>

                </div>
            </div>
        </div>
        <div class='col-7'>
            <div class="container-xxl">
                <div class="row justify-content-center">
                    <div class="col-10 custom-margin-top" id='form'>
                        <form action="{{url_for('submit')}}" method="POST" enctype="multipart/form-data">
                            <div class="mb-2">
                                <label for="form_type" class="form-label">Preset or Custom CSV File?</label>
                                <select class="form-control" name="csv_type" id="csv_type">
                                    <option selected>Options</option>
                                    <option value="preset_csv">Preset CSV</option>
                                    <option value="custom_csv">Custom CSV</option>
                                </select>
                            </div>
                            <div id="presets" class="d-none mb-3">
                                <label for="form_type" class="form-label">Preset Options</label>
                                <select class="form-control" name="preset_csv_options" id="form_type">
                                    <option selected>Options</option>
                                    <option value="Rena Emails">Rena Emails</option>
                                    <option value="preset2">Preset2</option>
                                </select>
                            </div>

                            <div id="customs" class="d-none mb-2">
                                <label for="csvFile" class="form-label">Custom CSV</label>
                                <input type="file" name="file" class="form-control" id="csvFile" accept=".csv"
                                    value="{{data.get('file', '')}}" placeholder="Enter csv File">
                            </div>
                            

                            <div class="form-group">
                                <label for="subject">Subject: </label>
                                <input type="text" class="form-control" name="subject" id="subject"
                                    placeholder="Subject" value="{{data.get('subject', '')}}">
                            </div>

                            <div class="form-group">
                                <label for="emailContent">Email Content: </label>
                                <textarea class="form-control" name="emailContent"
                                    id="emailContent">{{data.get('emailContent', '')}}</textarea>
                            </div>
                            <!--
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="" name = "HtmlButton" id="HtmlButton">
                        <label class="form-check-label" for="HtmlButton"> HTML Format</label>
                    </div>-->


                            <button type="submit" name="action_type" value="confirm"
                                class="btn btn-primary">Confirm</button>
                            <button type="submit" id='submit' name="action_type" value="submit" class="btn btn-primary"
                                {{'disabled' if not button_enabled}}>Submit</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

    </div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-bs4.min.js"></script>

    <script>
        $(document).ready(function () {
            $('#emailContent').summernote({
                height: 300 // Sets the visual height of the editing area
            });
        });

        var socket = io()
        socket.on('button_enabled', function (data) {
            if (data.status === 'True') {
                document.getElementById('submit').disabled = false;
            }
        });
        socket.on('confirmation_channel', function (data) {
            document.getElementById('confirmation_counter').innerText = data.amount;
        });

        const dropdown = document.getElementById('csv_type')
        const preset_csv = document.getElementById('presets')
        const custom_csv = document.getElementById('customs')

        dropdown.addEventListener('change', function () {
            preset_csv.classList.add('d-none');
            custom_csv.classList.add('d-none');

            if (this.value === 'preset_csv') {
                preset_csv.classList.remove('d-none');
            } else if (this.value === 'custom_csv') {
                custom_csv.classList.remove('d-none');
            }
        });

    </script>

</body>

</html>
