<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, inital-scale=1">
    <title>Email Blaster</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <link href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-bs4.min.css" rel="stylesheet">
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid justify-content-center">
            <a class="navbar-brand" href="/">Email Blaster</a>
        </div>
        <ul class="navbar-nav">
            <li class="nav-item">
                <a class="btn btn-dark" style='width: 115px;' href="{{url_for('admin_page')}}">Admin Page</a>
            </li>
            <li class="nav-item">
                {% if current_user.is_authenticated %}
                <a href="{{ url_for('logout') }}" class="btn btn-danger">Logout</a>
                {% endif %}
            </li>
        </ul>
    </nav>




    <div class="row ">
        <div class='col-5'>
            <div class="container mx-auto " id="custom-margin-top2">

                <h2 class="text-center">Confirmations: <span id="confirmation_counter">0</span></h2>
                <div class="card mx-auto">
                    <div class="card-body">
                        <h5 class="card-title">Card title</h5>
                        <h6 class="card-subtitle mb-2">Card subtitle</h6>
                        <p class="card-text">Text</p>
                    </div>

                </div>
            </div>
        </div>
        <div class='col-7'>
            <div class="container-xxl">
                <div class="row justify-content-center">
                    <div class="col-10 custom-margin-top" id='form'>
                        <a href = "{{url_for('create_email')}}"> Create New Email</a>
                    </div>
                </div>
            </div>
        </div>

    </div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-bs4.min.js"></script>

    <script>
        $(document).ready(function () {
            $('#emailContent').summernote({
                height: 300 // Sets the visual height of the editing area
            });
        });

        var socket = io()
        socket.on('button_enabled', function (data) {
            if (data.status === 'True') {
                document.getElementById('submit').disabled = false;
            }
        });
        socket.on('confirmation_channel', function (data) {
            document.getElementById('confirmation_counter').innerText = data.amount;
        });

        const dropdown = document.getElementById('csv_type')
        const preset_csv = document.getElementById('presets')
        const custom_csv = document.getElementById('customs')

        dropdown.addEventListener('change', function () {
            preset_csv.classList.add('d-none');
            custom_csv.classList.add('d-none');

            if (this.value === 'preset_csv') {
                preset_csv.classList.remove('d-none');
            } else if (this.value === 'custom_csv') {
                custom_csv.classList.remove('d-none');
            }
        });

    </script>

</body>

</html>
