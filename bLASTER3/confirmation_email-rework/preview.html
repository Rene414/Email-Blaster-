<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Confirm - Email Blaster</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- The link below is for the preview and is a relative path -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="main-content">
        <h1 class="display-1">Confirm Email Blast</h1>
        <p class="lead">Are you sure you want to send this email? This action cannot be undone.</p>

        <form method="POST" action="#">
            <input type="hidden" name="action_type" value="button_pressed">
            <button id="clickButton" value="confirm" type="submit" name="submit_button" class="btn btn-primary">Confirm & Send Email</button>
        </form>
    </main>

    <footer class="footer">
        <div class="container">
            <span>Email Blaster | &copy; 2026</span>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('clickButton').addEventListener('click', function(e) {
            e.preventDefault(); // Prevent form submission for the preview
            alert('This is a preview. The form will not be submitted.');
        });
    </script>

</body>

</html>
