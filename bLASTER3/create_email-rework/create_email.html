<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Create Email - Email Blaster</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-bs4.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='create_email-rework/style.css') }}">
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
</head>

<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Email Blaster</a>
            <div class="d-flex">
                <a class="btn btn-dark me-2" href="{{url_for('frontend')}}">Home Page</a>
                <a class="btn btn-dark me-2" href="{{url_for('admin_page')}}">Admin Page</a>
                {% if current_user.is_authenticated %}
                <a href="{{ url_for('logout') }}" class="btn btn-danger">Logout</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-10">
                    <div class="glass-card">
                        <h1 class="mb-4">Create New Email Campaign</h1>
                        <form id="create-email-form" action="{{url_for('create_email')}}" method="POST">
                            <div class="mb-3">
                                <label for="subject" class="form-label">Subject:</label>
                                <input type="text" class="form-control" name="subject" id="subject" placeholder="Enter the email subject">
                            </div>

                            <div class="mb-4">
                                <label for="emailContent" class="form-label">Email Content:</label>
                                <textarea class="form-control" name="emailContent" id="emailContent"></textarea>
                            </div>

                            <div class="d-flex justify-content-end">
                                <button type="submit" name="action_type" value="save" id="save" class="btn btn-secondary">Save Draft</button>
                                <button type="submit" name="action_type" value="confirm" id="confirm" class="btn btn-primary">Save and Request Confirmation</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-bs4.min.js"></script>

    <script>
        $(document).ready(function () {
            $('#emailContent').summernote({
                height: 350,
                toolbar: [
                    ['style', ['style']],
                    ['font', ['bold', 'underline', 'clear']],
                    ['fontname', ['fontname']],
                    ['color', ['color']],
                    ['para', ['ul', 'ol', 'paragraph']],
                    ['table', ['table']],
                    ['insert', ['link', 'picture', 'video']],
                    ['view', ['fullscreen', 'codeview', 'help']]
                ]
            });
        });

        const form = document.getElementById('create-email-form');
        form.addEventListener('submit', function() {
            // Disable buttons to prevent multiple submissions
            document.getElementById('save').disabled = true;
            document.getElementById('confirm').disabled = true;
        });

    </script>

</body>

</html>
