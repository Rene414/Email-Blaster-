<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Email Preview - Email Blaster</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Email Blaster</a>
            <div class="d-flex">
                <a class="btn btn-dark me-2" href="#">Admin Page</a>
                <a href="#" class="btn btn-danger">Logout</a>
            </div>
        </div>
    </nav>

    <div class="preview-container">
        <div class="preview-header">
            <h1>Your Awesome Subject Line Here</h1>
        </div>
        <div class="preview-body">
            <iframe srcdoc="'''
                <style>
                    body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
                    .container { padding: 20px; }
                    h1 { color: #004085; }
                </style>
                <div class="container">
                    <h1>Sample Email Content</h1>
                    <p>This is a sample of what your email will look like. You can include <strong>bold text</strong>, <em>italic text</em>, and even links.</p>
                    <p>Here is a sample button:</p>
                    <a href="#" style="background-color: #0069d9; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px;">Call to Action</a>
                </div>
            '''></iframe>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
