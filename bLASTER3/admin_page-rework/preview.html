<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin - Email Blaster</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-bs4.min.css" rel="stylesheet">
    <!-- The link below is for the preview and is a relative path -->
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
</head>

<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Email Blaster</a>
            <div class="d-flex">
                <a class="btn btn-dark me-2" href="#">Home Page</a>
                <a href="#" class="btn btn-danger">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1 class="custom-margin-top3">User Management</h1>
        <div class="main-content">
            <div class="card">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th scope="col">ID</th>
                            <th scope="col">Username</th>
                            <th scope="col">Admin Permissions?</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Placeholder data for preview -->
                        <tr>
                            <th scope="row">1</th>
                            <td>thomas.anderson</td>
                            <td>True</td>
                        </tr>
                        <tr>
                            <th scope="row">2</th>
                            <td>trinity</td>
                            <td>False</td>
                        </tr>
                        <tr>
                            <th scope="row">3</th>
                            <td>morpheus</td>
                            <td>False</td>
                        </tr>
                    </tbody>
                </table>
                <form action="#" id="form2" method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="form_type" class="form-label">Action</label>
                        <select class="form-select" name="user_form_type" id="form_type">
                            <option selected>Select an option...</option>
                            <option value="add_user">Add User</option>
                            <option value="delete_user">Delete User</option>
                        </select>
                    </div>
                    <div id="add_form" class="d-none mb-3">
                        <div class="mb-3">
                            <label for="username" class="form-label">Username:</label>
                            <input type="text" class="form-control" name="username" id="username" placeholder="Enter new username">
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" name="password" id="password" placeholder="Enter password">
                        </div>
                        <div class="form-check mb-3">
                            <input class="form-check-input" name="admin" type="checkbox" id="admin_privilege">
                            <label class="form-check-label" for="admin_privilege">Grant Admin Privileges?</label>
                        </div>
                    </div>

                    <div id="delete_form" class="d-none mb-3">
                        <label for="user_id" class="form-label">Select User to Delete:</label>
                        <select class="form-select" name="user_id" id="user_id">
                            <!-- Placeholder data for preview -->
                            <option value="1">thomas.anderson (ID: 1)</option>
                            <option value="2">trinity (ID: 2)</option>
                            <option value="3">morpheus (ID: 3)</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <button type="submit" name="action_type" value="confirm" class.blade.php"btn btn-primary">Submit</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-bs4.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const dropdown = document.getElementById('form_type');
            const add_form = document.getElementById('add_form');
            const delete_form = document.getElementById('delete_form');

            dropdown.addEventListener('change', function () {
                add_form.classList.add('d-none');
                delete_form.classList.add('d-none');

                if (this.value === 'add_user') {
                    add_form.classList.remove('d-none');
                } else if (this.value === 'delete_user') {
                    delete_form.classList.remove('d-none');
                }
            });
        });
    </script>

</body>

</html>
