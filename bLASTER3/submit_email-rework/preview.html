<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Submit Email - Email Blaster</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-bs4.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Email Blaster</a>
            <div class="d-flex">
                <a class="btn btn-dark me-2" href="#">Home Page</a>
                <a class="btn btn-dark me-2" href="#">Admin Page</a>
                <a href="#" class="btn btn-danger">Logout</a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="form-container">
            <h2>Finalize and Send Email Blast</h2>
            <form action="#" method="POST" enctype="multipart/form-data" onsubmit="return false;">
                <div class="mb-3">
                    <label for="csv_type" class="form-label">Recipient List</label>
                    <select class="form-select" name="csv_type" id="csv_type">
                        <option selected>Choose a recipient source...</option>
                        <option value="preset_csv">Preset CSV</option>
                        <option value="custom_csv">Custom CSV</option>
                    </select>
                </div>

                <div id="presets" class="d-none mb-3">
                    <label for="preset_csv_options" class="form-label">Preset Options</label>
                    <select class="form-select" name="preset_csv_options" id="preset_csv_options">
                        <option selected>Select a preset list...</option>
                        <option value="Rena Emails">Rena Emails</option>
                        <option value="preset2">All Employees</option>
                    </select>
                </div>

                <div id="customs" class="d-none mb-3">
                    <label for="csvFile" class="form-label">Upload Custom CSV</label>
                    <input type="file" name="file" class="form-control" id="csvFile" accept=".csv">
                </div>

                <div class="mb-3">
                    <label for="subject" class="form-label">Subject:</label>
                    <input type="text" class="form-control" name="subject" id="subject" placeholder="Subject" value="Finalized Quarterly Report">
                </div>

                <div class="mb-3">
                    <label for="emailContent" class="form-label">Email Content:</label>
                    <textarea class="form-control" name="emailContent" id="emailContent"><p>Here is the finalized quarterly report. Please review at your earliest convenience.</p></textarea>
                </div>

                <button type="submit" id="submit" name="action_type" value="submit" class="btn btn-primary">Send Email Blast</button>
            </form>
        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-bs4.min.js"></script>

    <script>
        $(document).ready(function () {
            $('#emailContent').summernote({
                height: 300
            });
        });

        const dropdown = document.getElementById('csv_type');
        const preset_csv = document.getElementById('presets');
        const custom_csv = document.getElementById('customs');

        dropdown.addEventListener('change', function () {
            if (this.value === 'preset_csv') {
                preset_csv.classList.remove('d-none');
                custom_csv.classList.add('d-none');
            } else if (this.value === 'custom_csv') {
                custom_csv.classList.remove('d-none');
                preset_csv.classList.add('d-none');
            } else {
                preset_csv.classList.add('d-none');
                custom_csv.classList.add('d-none');
            }
        });

        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('This is a preview. The form will not be submitted.');
        });
    </script>

</body>

</html>
