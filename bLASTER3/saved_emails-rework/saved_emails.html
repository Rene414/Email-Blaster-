<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Saved Email - Email Blaster</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-bs4.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='saved_emails-rework/style.css') }}">
</head>

<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Email Blaster</a>
            <div class="d-flex">
                <a class="btn btn-dark me-2" href="{{url_for('frontend')}}">Home Page</a>
                <a class="btn btn-dark me-2" href="{{url_for('admin_page')}}">Admin Page</a>
                {% if current_user.is_authenticated %}
                <a href="{{ url_for('logout') }}" class="btn btn-danger">Logout</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="form-container">
            <h2>Edit Saved Email Draft</h2>
            <form action="{{url_for('saved_emails', email_unique_id=email_unique_id)}}" method="POST">
                <div class="mb-3">
                    <label for="subject" class="form-label">Subject:</label>
                    <input type="text" class="form-control" name="subject" id="subject" placeholder="Subject" value="{{data.get('subject', '')}}">
                </div>

                <div class="mb-3">
                    <label for="emailContent" class="form-label">Email Content:</label>
                    <textarea class="form-control" name="emailContent" id="emailContent">{{data.get('emailContent', '')}}</textarea>
                </div>

                <div class="button-group">
                    <button type="submit" name="action_type" value="update" class="btn btn-primary">Update Draft</button>
                    <button type="submit" name="action_type" value="confirm" class="btn btn-success">Request Confirmation</button>
                </div>
            </form>
        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-bs4.min.js"></script>

    <script>
        $(document).ready(function () {
            $('#emailContent').summernote({
                height: 400, // Increased height for better editing
                toolbar: [
                    ['style', ['style']],
                    ['font', ['bold', 'underline', 'clear']],
                    ['fontname', ['fontname']],
                    ['color', ['color']],
                    ['para', ['ul', 'ol', 'paragraph']],
                    ['table', ['table']],
                    ['insert', ['link', 'picture', 'video']],
                    ['view', ['fullscreen', 'codeview', 'help']]
                ]
            });
        });
    </script>

</body>

</html>
