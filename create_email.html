<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">

        <ul class="navbar-nav">

            <main class="main-content">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-10">
                    <div class="glass-card">
                        <h1 class="mb-4">Create New Email Campaign</h1>
                        <form id = "create-email-form" onsubmit = "disableButtons()" action="{{url_for('create_email')}}" method="POST" enctype="multipart/form-data">
                            

                            <div class="mb-3">
                                <label for="subject">Subject: </label>
                                <input type="text" class="form-control" name="subject" id="subject"
                                    placeholder="Subject" >
                            </div>

                            <div class="mb-3">
                                <label for="emailContent">Email Content: </label>
                                <textarea class="form-control" name="emailContent"
                                    id="emailContent"></textarea>
                            </div>
                            <!--
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="" name = "HtmlButton" id="HtmlButton">
                        <label class="form-check-label" for="HtmlButton"> HTML Format</label>
                    </div>-->

                    <div class="d-flex justify-content-end">
                            <button type="submit" onclick = "disableButtons()" name="action_type" value="save" id = "save"
                                class="btn btn-primary">Save</button>
                                
                            <button type="submit" onclick = "disableButtons()" name="action_type" value="confirm" id = "confirm"
                                class="btn btn-primary">Confirm</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        $(document).ready(function () {
            $('#emailContent').summernote({
                height: 300, // Sets the visual height of the editing area
                toolbar: [
                    ['style', ['style']],
                    ['font', ['bold', 'underline', 'clear']],
                    ['color', ['color']],
                    ['para', ['ul', 'ol', 'paragraph']],
                    ['table', ['table']],
                    ['insert', ['link', 'picture', 'video']],
                    ['view', ['fullscreen', 'codeview', 'help']]
                ]
            });
            });
        
        const form = document.getElementById('create-email-form');
        const saveButton = document.getElementById('save');
        const confirmButton = document.getElementById('confirm');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
    // Logic for your API call here
            console.log("Form submitted exactly once.");
        }, { once: true });

        var socket = io()
        socket.on('button_enabled', function (data) {
            if (data.status === 'True') {
                document.getElementById('submit').disabled = false;
            }
        });
        socket.on('confirmation_channel', function (data) {
            document.getElementById('confirmation_counter').innerText = data.amount;
        });
